[workspace]
resolver = "2"
members = [
    "crates/memf-format",
    "crates/memf-strings",
    "crates/memf-symbols",
    "crates/memf-core",
    "crates/memf-linux",
    "crates/memf-windows",
]

[workspace.package]
edition = "2021"
rust-version = "1.75"
license = "Apache-2.0"
repository = "https://github.com/SecurityRonin/memory-forensic"

[workspace.dependencies]
memf-format  = { path = "crates/memf-format" }
memf-strings = { path = "crates/memf-strings" }
memf-symbols = { path = "crates/memf-symbols" }
memf-core    = { path = "crates/memf-core" }
memf-linux   = { path = "crates/memf-linux" }
memf-windows = { path = "crates/memf-windows" }
thiserror = "2"
anyhow = "1"
inventory = "0.3"
memmap2 = "0.9"
snap = "1"
regex = "1"
aho-corasick = "1"
yara-x = "0.12"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
clap = { version = "4", features = ["derive"] }
comfy-table = "7"
bytemuck = { version = "1", features = ["derive"] }
goblin = "0.9"
rust-lzxpress = "0.7"
flate2 = { version = "1", default-features = false, features = ["miniz_oxide"] }
ruzstd = "0.8"
lru = "0.16"
pdb = "0.8"
ureq = "3"
zip = { version = "2", default-features = false, features = ["deflate"] }
sevenz-rust = "0.6"
tempfile = "3"

[workspace.lints.clippy]
pedantic = { level = "warn", priority = -1 }
module_name_repetitions = "allow"
must_use_candidate = "allow"
missing_errors_doc = "allow"
missing_panics_doc = "allow"
doc_markdown = "allow"
cast_possible_truncation = "allow"
unnecessary_literal_bound = "allow"
return_self_not_must_use = "allow"
unreadable_literal = "allow"
type_complexity = "allow"
similar_names = "allow"

[package]
name = "memf"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
license.workspace = true

[[bin]]
name = "memf"
path = "src/main.rs"

[dependencies]
memf-format.workspace = true
memf-strings.workspace = true
memf-symbols.workspace = true
memf-core.workspace = true
memf-linux.workspace = true
memf-windows.workspace = true
anyhow.workspace = true
clap.workspace = true
comfy-table.workspace = true
serde_json.workspace = true
zip.workspace = true
sevenz-rust.workspace = true
tempfile.workspace = true

[lints]
workspace = true
